<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agency Engine — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="dark"] {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-2: #1a1a26;
      --border: #2a2a3a;
      --text: #e4e4ef;
      --text-dim: #7a7a8f;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.15);
      --green: #00b894;
      --yellow: #fdcb6e;
      --red: #e17055;
      --blue: #74b9ff;
      --orange: #f39c12;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', 'Consolas', monospace;
    }

    [data-theme="light"] {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface-2: #f0f1f3;
      --border: #e0e1e6;
      --text: #1a1a2e;
      --text-dim: #6b6b80;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.08);
      --green: #00a884;
      --yellow: #e6a817;
      --red: #d63031;
      --blue: #3b82f6;
      --orange: #e67e22;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Header ─────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 .dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .header-meta {
      display: flex;
      gap: 20px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .header-meta span { font-family: var(--mono); }

    /* ── Layout ─────────────────────────── */
    .dashboard {
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Stats Row ──────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      font-family: var(--mono);
    }
    .stat-card .sub {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Panels ─────────────────────────── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 900px) {
      .panels { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
    .panel-header h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .panel-header .count {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--mono);
    }
    .panel-body {
      max-height: 360px;
      overflow-y: auto;
    }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Table rows ─────────────────────── */
    .row {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      gap: 12px;
      transition: background 0.15s;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: var(--accent-glow); }
    .row .name {
      flex: 1;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row .meta {
      color: var(--text-dim);
      font-size: 11px;
      font-family: var(--mono);
      white-space: nowrap;
    }
    .row .time {
      color: var(--text-dim);
      font-size: 11px;
      font-family: var(--mono);
      min-width: 70px;
      text-align: right;
    }

    /* ── Badges ─────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: var(--mono);
      white-space: nowrap;
    }
    .badge-new       { background: rgba(116,185,255,0.15); color: var(--blue); }
    .badge-contacted { background: rgba(108,92,231,0.15); color: var(--accent); }
    .badge-interested { background: rgba(0,184,148,0.15); color: var(--green); }
    .badge-demo_sent { background: rgba(253,203,110,0.15); color: var(--yellow); }
    .badge-closed_won { background: rgba(0,184,148,0.2); color: var(--green); }
    .badge-closed_lost { background: rgba(225,112,85,0.15); color: var(--red); }
    .badge-excluded  { background: rgba(122,122,143,0.15); color: var(--text-dim); }

    .badge-queued    { background: rgba(116,185,255,0.15); color: var(--blue); }
    .badge-running   { background: rgba(253,203,110,0.15); color: var(--yellow); animation: pulse 1s infinite; }
    .badge-completed { background: rgba(0,184,148,0.15); color: var(--green); }
    .badge-failed    { background: rgba(225,112,85,0.15); color: var(--red); }
    .badge-dead      { background: rgba(225,112,85,0.25); color: var(--red); }

    .badge-onboarding { background: rgba(116,185,255,0.15); color: var(--blue); }
    .badge-active    { background: rgba(0,184,148,0.15); color: var(--green); }
    .badge-churned   { background: rgba(225,112,85,0.15); color: var(--red); }
    .badge-paused    { background: rgba(253,203,110,0.15); color: var(--yellow); }

    /* ── Config panel ───────────────────── */
    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }
    .config-item {
      background: var(--surface);
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .config-item .ck { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
    .config-item .cv { font-size: 14px; font-family: var(--mono); font-weight: 500; }

    /* ── Empty state ─────────────────────── */
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }

    /* ── Full-width panel ────────────────── */
    .full-width { grid-column: 1 / -1; }

    /* ── Pipeline bar ────────────────────── */
    .pipeline-bar {
      display: flex;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      background: var(--surface-2);
      margin: 0 20px 16px;
    }
    .pipeline-bar div {
      height: 100%;
      transition: width 0.5s ease;
    }

    /* ── Action bar ──────────────────────── */
    .action-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { border-color: var(--accent); background: var(--accent-glow); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-accent {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-accent:hover { opacity: 0.9; background: var(--accent); }
    .btn .spinner {
      display: none;
      width: 12px; height: 12px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .btn.loading .spinner { display: inline-block; }
    .btn.loading { opacity: 0.7; pointer-events: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Filter bar ──────────────────────── */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar select, .filter-bar input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 12px;
      outline: none;
    }
    .filter-bar select:focus, .filter-bar input:focus {
      border-color: var(--accent);
    }
    .filter-bar input { min-width: 180px; }
    .filter-bar label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Toast ───────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--font);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="dot"></span> Agency Engine</h1>
    <div class="header-meta">
      <span id="phase">Phase —</span>
      <span id="uptime">—</span>
      <span id="last-refresh">—</span>
      <button id="theme-toggle" onclick="toggleTheme()" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:6px;cursor:pointer;font-family:var(--font);font-size:12px">🌙</button>
    </div>
  </div>

  <div class="dashboard">
    <!-- Actions -->
    <div class="action-bar">
      <button class="btn btn-accent" onclick="triggerJob('lead_gen')" id="btn-lead-gen">
        <span class="spinner"></span> 🔍 Run Scraper
      </button>
      <button class="btn" onclick="triggerJob('churn_check')" id="btn-churn-check">
        <span class="spinner"></span> 📉 Churn Check
      </button>
      <button class="btn" onclick="triggerJob('monthly_report')" id="btn-monthly-report">
        <span class="spinner"></span> 📊 Monthly Report
      </button>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="stats-row"></div>

    <!-- Pipeline bar -->
    <div class="panel full-width" style="padding-top:16px">
      <div class="panel-header"><h2>Lead Pipeline</h2></div>
      <div style="padding: 16px 0 0;">
        <div class="pipeline-bar" id="pipeline-bar"></div>
        <div style="display:flex; gap:16px; padding: 0 20px 16px; flex-wrap:wrap;" id="pipeline-legend"></div>
      </div>
    </div>

    <!-- Leads (full width with filters) -->
    <div class="panel full-width">
      <div class="panel-header">
        <h2>Leads</h2>
        <span class="count" id="lead-count">—</span>
      </div>
      <div class="filter-bar">
        <label>Status</label>
        <select id="f-status" onchange="refreshLeads()">
          <option value="">All</option>
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="interested">Interested</option>
          <option value="demo_sent">Demo Sent</option>
          <option value="closed_won">Won</option>
          <option value="closed_lost">Lost</option>
          <option value="excluded">Excluded</option>
        </select>
        <label>Niche</label>
        <select id="f-niche" onchange="refreshLeads()">
          <option value="">All</option>
        </select>
        <label>City</label>
        <input id="f-city" type="text" placeholder="Filter by city..." oninput="debounceLeads()">
        <label>Search</label>
        <input id="f-search" type="text" placeholder="Business name..." oninput="debounceLeads()">
        <button class="btn" onclick="clearFilters()" style="margin-left:auto;font-size:11px;padding:5px 10px">✕ Clear</button>
      </div>
      <div class="panel-body" id="leads-list" style="max-height:500px"></div>
    </div>

    <!-- Panels -->
    <div class="panels">
      <!-- Jobs -->
      <div class="panel">
        <div class="panel-header">
          <h2>Jobs</h2>
          <span class="count" id="job-count">—</span>
        </div>
        <div class="panel-body" id="jobs-list"></div>
      </div>

      <!-- Clients -->
      <div class="panel">
        <div class="panel-header">
          <h2>Clients</h2>
          <span class="count" id="client-count">—</span>
        </div>
        <div class="panel-body" id="clients-list"></div>
      </div>
    </div>

    <!-- System Config (full width) -->
    <div class="panel full-width">
      <div class="panel-header">
        <h2>System Config</h2>
      </div>
        <div class="panel-body" id="config-panel"></div>
      </div>
    </div>
  <div id="toast" class="toast"></div>

  <script>
    const API = window.location.origin;
    const API_KEY = 'local_dev_api_key_change_in_prod';
    const headers = { 'x-api-key': API_KEY };
    const startTime = Date.now();
    let knownNiches = new Set();
    let debounceTimer = null;

    function ago(iso) {
      if (!iso) return '—';
      const diff = Date.now() - new Date(iso).getTime();
      if (diff < 60000) return Math.floor(diff / 1000) + 's ago';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
      return Math.floor(diff / 86400000) + 'd ago';
    }

    function badge(status) {
      const cls = 'badge-' + (status || 'new').replace(/\s/g, '_');
      return `<span class="badge ${cls}">${status || 'new'}</span>`;
    }

    function uptime() {
      const s = Math.floor((Date.now() - startTime) / 1000);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      if (h > 0) return `${h}h ${m % 60}m uptime`;
      if (m > 0) return `${m}m ${s % 60}s uptime`;
      return `${s}s uptime`;
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => { t.className = 'toast'; }, 3000);
    }

    // ── Trigger a job ──────────────────────────────────
    async function triggerJob(jobType) {
      const btn = document.getElementById('btn-' + jobType.replace(/_/g, '-'));
      if (btn) btn.classList.add('loading');
      try {
        await axios.post(API + '/api/jobs/trigger', { jobType }, { headers: { ...headers, 'Content-Type': 'application/json' } });
        showToast(`✓ ${jobType.replace(/_/g, ' ')} queued`, 'success');
        setTimeout(refresh, 1000);
      } catch (err) {
        showToast(`✗ Failed: ${err.response?.data?.error || err.message}`, 'error');
      } finally {
        if (btn) setTimeout(() => btn.classList.remove('loading'), 500);
      }
    }

    // ── Filtered leads fetch ───────────────────────────
    async function refreshLeads() {
      const params = new URLSearchParams();
      const status = document.getElementById('f-status').value;
      const niche = document.getElementById('f-niche').value;
      const city = document.getElementById('f-city').value.trim();
      const search = document.getElementById('f-search').value.trim();
      if (status) params.set('status', status);
      if (niche) params.set('niche', niche);
      if (city) params.set('city', city);
      if (search) params.set('search', search);

      try {
        const res = await axios.get(API + '/api/leads?' + params.toString(), { headers });
        const leads = res.data.docs || [];

        document.getElementById('lead-count').textContent = `${res.data.totalDocs ?? leads.length} total`;
        const list = document.getElementById('leads-list');
        if (leads.length === 0) {
          list.innerHTML = '<div class="empty">No leads match filters</div>';
        } else {
          list.innerHTML = leads.map(l => `
            <div class="row">
              <span class="name">${l.businessName || l.business_name || '—'}</span>
              <span class="meta">${l.niche || ''} · ${l.city || ''}${l.state ? ', ' + l.state : ''}</span>
              ${badge(l.status)}
              <span class="time">${ago(l.createdAt || l.created_at)}</span>
            </div>
          `).join('');
        }

        // Auto-populate niche dropdown
        leads.forEach(l => { if (l.niche) knownNiches.add(l.niche); });
        const nicheSelect = document.getElementById('f-niche');
        const currentNiche = nicheSelect.value;
        const opts = ['<option value="">All</option>'];
        [...knownNiches].sort().forEach(n => {
          opts.push(`<option value="${n}" ${n === currentNiche ? 'selected' : ''}>${n}</option>`);
        });
        nicheSelect.innerHTML = opts.join('');
      } catch (err) {
        console.error('Lead fetch error:', err);
      }
    }

    function debounceLeads() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(refreshLeads, 300);
    }

    function clearFilters() {
      document.getElementById('f-status').value = '';
      document.getElementById('f-niche').value = '';
      document.getElementById('f-city').value = '';
      document.getElementById('f-search').value = '';
      refreshLeads();
    }

    const PIPELINE_COLORS = {
      new: '#74b9ff',
      contacted: '#6c5ce7',
      interested: '#00b894',
      demo_sent: '#fdcb6e',
      closed_won: '#00cec9',
      closed_lost: '#e17055',
      excluded: '#636e72',
    };

    // ── Main refresh (stats, pipeline, jobs, clients, config) ──
    async function refresh() {
      try {
        const [allLeadsRes, clientsRes, jobsRes, configRes] = await Promise.all([
          axios.get(API + '/api/leads?limit=500', { headers }),
          axios.get(API + '/api/clients', { headers }),
          axios.get(API + '/api/jobs?limit=100', { headers }),
          axios.get(API + '/api/config', { headers }),
        ]);

        const allLeads = allLeadsRes.data.docs || [];
        const clients = clientsRes.data.docs || [];
        const jobs = jobsRes.data.docs || [];
        const config = configRes.data;

        // Header
        document.getElementById('phase').textContent = `Phase ${config.currentPhase || '—'}`;
        document.getElementById('uptime').textContent = uptime();
        document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString();

        // Stats
        const statusCounts = {};
        allLeads.forEach(l => { statusCounts[l.status] = (statusCounts[l.status] || 0) + 1; });

        const jobStatusCounts = {};
        jobs.forEach(j => { jobStatusCounts[j.status] = (jobStatusCounts[j.status] || 0) + 1; });

        document.getElementById('stats-row').innerHTML = `
          <div class="stat-card">
            <span class="label">Total Leads</span>
            <span class="value">${allLeadsRes.data.totalDocs || allLeads.length}</span>
            <span class="sub">${statusCounts.new || 0} new</span>
          </div>
          <div class="stat-card">
            <span class="label">Interested</span>
            <span class="value" style="color:var(--green)">${statusCounts.interested || 0}</span>
            <span class="sub">${statusCounts.demo_sent || 0} demos sent</span>
          </div>
          <div class="stat-card">
            <span class="label">Clients</span>
            <span class="value" style="color:var(--accent)">${clientsRes.data.totalDocs || clients.length}</span>
            <span class="sub">${clients.filter(c => c.status === 'active').length} active</span>
          </div>
          <div class="stat-card">
            <span class="label">Jobs Queued</span>
            <span class="value" style="color:var(--yellow)">${jobStatusCounts.queued || 0}</span>
            <span class="sub">${jobStatusCounts.running || 0} running</span>
          </div>
          <div class="stat-card">
            <span class="label">Jobs Done</span>
            <span class="value" style="color:var(--green)">${jobStatusCounts.completed || 0}</span>
            <span class="sub">${jobStatusCounts.failed || 0} failed, ${jobStatusCounts.dead || 0} dead</span>
          </div>
          <div class="stat-card">
            <span class="label">Won / Lost</span>
            <span class="value">${statusCounts.closed_won || 0}<span style="color:var(--text-dim);font-size:16px"> / </span>${statusCounts.closed_lost || 0}</span>
            <span class="sub">conversion pipeline</span>
          </div>
        `;

        // Pipeline bar
        const total = allLeads.length || 1;
        const bar = document.getElementById('pipeline-bar');
        const legend = document.getElementById('pipeline-legend');
        let barHtml = '';
        let legendHtml = '';
        for (const [status, color] of Object.entries(PIPELINE_COLORS)) {
          const c = statusCounts[status] || 0;
          if (c > 0) {
            barHtml += `<div style="width:${(c/total)*100}%;background:${color}" title="${status}: ${c}"></div>`;
          }
          legendHtml += `<span style="font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:4px">
            <span style="width:8px;height:8px;border-radius:2px;background:${color};display:inline-block"></span>
            ${status.replace(/_/g,' ')} (${c})
          </span>`;
        }
        bar.innerHTML = barHtml;
        legend.innerHTML = legendHtml;

        // Auto-populate niches from all leads
        allLeads.forEach(l => { if (l.niche) knownNiches.add(l.niche); });

        // Jobs list
        document.getElementById('job-count').textContent = `${jobsRes.data.totalDocs || jobs.length} total`;
        const jobsList = document.getElementById('jobs-list');
        if (jobs.length === 0) {
          jobsList.innerHTML = '<div class="empty">No jobs yet</div>';
        } else {
          jobsList.innerHTML = jobs.slice(0, 30).map(j => `
            <div class="row">
              <span class="name">${(j.jobType || j.job_type || '—').replace(/_/g, ' ')}</span>
              ${badge(j.status)}
              <span class="time">${ago(j.updatedAt || j.updated_at)}</span>
            </div>
          `).join('');
        }

        // Clients list
        document.getElementById('client-count').textContent = `${clientsRes.data.totalDocs || clients.length} total`;
        const clientsList = document.getElementById('clients-list');
        if (clients.length === 0) {
          clientsList.innerHTML = '<div class="empty">No clients yet</div>';
        } else {
          clientsList.innerHTML = clients.slice(0, 20).map(c => `
            <div class="row">
              <span class="name">${c.businessName || c.business_name || '—'}</span>
              <span class="meta">${c.plan || '—'}</span>
              ${badge(c.status)}
              <span class="time">${ago(c.createdAt || c.created_at)}</span>
            </div>
          `).join('');
        }

        // Config panel
        const configPanel = document.getElementById('config-panel');
        configPanel.innerHTML = `<div class="config-grid">
          <div class="config-item"><span class="ck">Phase</span><span class="cv">${config.currentPhase ?? '—'}</span></div>
          <div class="config-item"><span class="ck">Niche</span><span class="cv">${config.activeNiche ?? '—'}</span></div>
          <div class="config-item"><span class="ck">Cities</span><span class="cv">${(config.activeCities || []).join(', ') || '—'}</span></div>
          <div class="config-item"><span class="ck">Maintenance</span><span class="cv">${config.maintenanceMode ? '🔴 ON' : '🟢 OFF'}</span></div>
          <div class="config-item"><span class="ck">Email Approval</span><span class="cv">${config.emailApprovalRequired ? '✓ Required' : '✗ Auto'}</span></div>
          <div class="config-item"><span class="ck">Demo Approval</span><span class="cv">${config.demoApprovalRequired ? '✓ Required' : '✗ Auto'}</span></div>
          <div class="config-item"><span class="ck">Launch Approval</span><span class="cv">${config.launchApprovalRequired ? '✓ Required' : '✗ Auto'}</span></div>
          <div class="config-item"><span class="ck">Updated</span><span class="cv">${ago(config.updatedAt || config.updated_at)}</span></div>
        </div>`;

        // Also refresh filtered leads panel
        await refreshLeads();

      } catch (err) {
        console.error('Refresh failed:', err);
      }
    }

    // Theme toggle
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme') || 'dark';
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-toggle').textContent = next === 'dark' ? '🌙' : '☀️';
    }
    (function initTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('theme-toggle').textContent = theme === 'dark' ? '🌙' : '☀️';
    })();

    // Initial load + poll every 5s
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
