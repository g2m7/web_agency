<head>

  <style type="text/tailwindcss">
    @theme {
      --color-bg: #111213;
      --color-surface: #1e1e1e;
      --color-surface-2: #282828;
      --color-border: #3d3d3d;
      --color-border-hud: #555555;
      --color-dim: #8b949e;
      --color-accent: #fb923c;
      --color-accent-dim: #c2410c;
      --color-accent-glow: rgba(251, 146, 60, 0.15);
      --color-good: #34d399;
      --color-warn: #facc15;
      --color-bad: #f87171;
      --color-info: #38bdf8;
      --color-hud-text: #c9d1d9;
      --color-hud-bright: #ffffff;
    }
  </style>
  <style>
    @custom-variant dark (&:where(.dark, .dark *));
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', 'Rajdhani', system-ui, sans-serif;
      background-color: var(--color-bg);
      color: var(--color-hud-bright);
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 220px;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    header, nav, main, .toast { position: relative; z-index: 1; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--color-surface); }
    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-accent-dim); }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hud-panel {
      position: relative;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      border-radius: 0;
      box-shadow: 6px 6px 0px rgba(0,0,0,0.3);
    }
    .hud-panel::before, .hud-panel::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--color-accent);
      border-style: solid;
      opacity: 1;
      pointer-events: none;
    }
    .hud-panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .hud-panel::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .header-shell {
      background: var(--color-surface);
      border-bottom: 2px solid var(--color-border);
      box-shadow: 0 4px 0px rgba(0,0,0,0.2);
    }
    .nav-shell {
      background: var(--color-surface-2);
      border-bottom: 1px solid var(--color-border);
    }

    .btn {
      border-radius: 0;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
      text-transform: uppercase;
      box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
    }
    .btn:active { transform: translate(2px, 2px); box-shadow: none; }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    .btn:hover::after { opacity: 1; }

    .btn-primary {
      background: var(--color-accent);
      border-color: var(--color-accent) !important;
      color: #000 !important;
      font-weight: 700;
    }
    .btn-primary:hover { background: #ff8533; border-color: #ff8533 !important; }

    .view { display: none; }
    .view.active { display: flex; }

    input, select, textarea {
      border-radius: 0 !important;
      background: var(--color-bg) !important;
      border: 1px solid var(--color-border) !important;
      color: var(--color-hud-bright) !important;
      box-shadow: inset 2px 2px 0px rgba(0,0,0,0.3);
    }
    input:focus, select:focus, textarea:focus { border-color: var(--color-accent) !important; outline: none; }

    .nav-tab {
      border-radius: 0;
      margin: 0;
      background: transparent;
      border: none;
      border-right: 1px solid var(--color-border);
      border-bottom: 2px solid transparent;
      color: var(--color-dim);
    }
    .nav-tab:hover { color: var(--color-hud-bright); background: var(--color-surface); }
    .nav-tab.nav-active { color: var(--color-accent); border-bottom-color: var(--color-accent); background: var(--color-surface); }

    .spinner { display: none; width: 12px; height: 12px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 0; animation: spin 0.6s linear infinite; }
    .btn.loading .spinner { display: inline-block; }
    .btn.loading { opacity: 0.7; pointer-events: none; }

    .badge-scored { background: rgba(99, 102, 241, 0.10); color: #818cf8; border-left: 2px solid #818cf8; }
    .badge-contacted { background: rgba(234, 179, 8, 0.08); color: var(--color-warn); border-left: 2px solid var(--color-warn); }
    .badge-replied_interested { background: rgba(16, 185, 129, 0.10); color: var(--color-good); border-left: 2px solid var(--color-good); }
    .badge-replied_objection { background: rgba(249, 115, 22, 0.08); color: var(--color-accent); border-left: 2px solid var(--color-accent); }
    .badge-demo_sent { background: rgba(56, 189, 248, 0.10); color: var(--color-info); border-left: 2px solid var(--color-info); }
    .badge-paid { background: rgba(16, 185, 129, 0.15); color: var(--color-good); border-left: 2px solid var(--color-good); }
    .badge-lost { background: rgba(239, 68, 68, 0.10); color: var(--color-bad); border-left: 2px solid var(--color-bad); }
    .badge-archived { background: rgba(139, 148, 158, 0.10); color: var(--color-dim); border-left: 2px solid var(--color-dim); }

    .badge-queued { background: rgba(14, 165, 233, 0.12); color: var(--color-info); border-left: 2px solid var(--color-info); }
    .badge-running { background: rgba(234, 179, 8, 0.12); color: var(--color-warn); border-left: 2px solid var(--color-warn); animation: pulse 1.5s infinite; }
    .badge-completed { background: rgba(16, 185, 129, 0.10); color: var(--color-good); border-left: 2px solid var(--color-good); }
    .badge-failed, .badge-dead { background: rgba(239, 68, 68, 0.10); color: var(--color-bad); border-left: 2px solid var(--color-bad); }

    .badge-pending_payment { background: rgba(234, 179, 8, 0.10); color: var(--color-warn); border-left: 2px solid var(--color-warn); }
    .badge-onboarding { background: rgba(14, 165, 233, 0.12); color: var(--color-info); border-left: 2px solid var(--color-info); }
    .badge-active { background: rgba(16, 185, 129, 0.10); color: var(--color-good); border-left: 2px solid var(--color-good); }
    .badge-payment_failed { background: rgba(239, 68, 68, 0.10); color: var(--color-bad); border-left: 2px solid var(--color-bad); }
    .badge-grace_period { background: rgba(234, 179, 8, 0.10); color: var(--color-warn); border-left: 2px solid var(--color-warn); }
    .badge-suspended { background: rgba(239, 68, 68, 0.12); color: var(--color-bad); border-left: 2px solid var(--color-bad); }
    .badge-cancelled { background: rgba(139, 148, 158, 0.10); color: var(--color-dim); border-left: 2px solid var(--color-dim); }

    .badge-hot { background: rgba(239, 68, 68, 0.10); color: var(--color-bad); border-left: 2px solid var(--color-bad); }
    .badge-warm { background: rgba(234, 179, 8, 0.10); color: var(--color-warn); border-left: 2px solid var(--color-warn); }
    .badge-low { background: rgba(139, 148, 158, 0.10); color: var(--color-dim); border-left: 2px solid var(--color-dim); }
    .badge-valid { background: rgba(16, 185, 129, 0.10); color: var(--color-good); border-left: 2px solid var(--color-good); }
    .badge-risky { background: rgba(234, 179, 8, 0.10); color: var(--color-warn); border-left: 2px solid var(--color-warn); }
    .badge-invalid { background: rgba(239, 68, 68, 0.10); color: var(--color-bad); border-left: 2px solid var(--color-bad); }
    .badge-pending { background: rgba(14, 165, 233, 0.12); color: var(--color-info); border-left: 2px solid var(--color-info); }

    .badge-candidate { background: rgba(14, 165, 233, 0.12); color: var(--color-info); border-left: 2px solid var(--color-info); }
    .badge-scored { background: rgba(234, 179, 8, 0.10); color: var(--color-warn); border-left: 2px solid var(--color-warn); }
    .badge-validated { background: rgba(249, 115, 22, 0.08); color: var(--color-accent); border-left: 2px solid var(--color-accent); }
    .badge-approved { background: rgba(16, 185, 129, 0.12); color: var(--color-good); border-left: 2px solid var(--color-good); }
    .badge-parked { background: rgba(139, 148, 158, 0.10); color: var(--color-dim); border-left: 2px solid var(--color-dim); }
    .badge-dropped { background: rgba(239, 68, 68, 0.10); color: var(--color-bad); border-left: 2px solid var(--color-bad); }

    .score-bar { display: flex; height: 8px; border-radius: 0; overflow: hidden; background: var(--color-bg); width: 100px; border: 1px solid var(--color-border); }
    .score-bar-fill { height: 100%; border-radius: 0; transition: width 0.3s; }
    .score-high { background: var(--color-good); }
    .score-mid { background: var(--color-warn); }
    .score-low { background: var(--color-bad); }

    .pipeline-bar { display: flex; height: 14px; border-radius: 0; overflow: hidden; background: var(--color-bg); border: 1px solid var(--color-border); }
    .pipeline-bar div { height: 100%; transition: width 0.5s ease; border-right: 1px solid var(--color-bg); }

    .step-flow { display: flex; flex-direction: column; gap: 0; }
    .step-row { display: flex; align-items: stretch; gap: 0; }
    .step-cell { padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--color-border); font-family: 'Share Tech Mono', monospace; font-size: 12px; }
    .step-cell-label { width: 120px; min-width: 120px; color: var(--color-dim); text-transform: uppercase; letter-spacing: 1px; font-size: 10px; }
    .step-cell-bar { flex: 1; display: flex; align-items: center; gap: 6px; }
    .step-cell-count { font-size: 16px; font-weight: bold; min-width: 36px; text-align: right; }
    .step-bar-track { flex: 1; height: 10px; background: var(--color-bg); border: 1px solid var(--color-border); overflow: hidden; position: relative; }
    .step-bar-fill { height: 100%; transition: width 0.4s ease; }
    .step-cell-pct { font-size: 11px; color: var(--color-dim); min-width: 38px; text-align: right; }
    .step-cell-arrow { width: 28px; display: flex; align-items: center; justify-content: center; color: var(--color-dim); font-size: 10px; }
    .step-cell-rate { min-width: 50px; text-align: center; font-size: 12px; font-weight: bold; }

    .kanban-col {
      min-width: 180px;
      flex: 1;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
    }
    .kanban-col-header {
      padding: 10px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-bottom: 2px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .kanban-col-body {
      max-height: 340px;
      overflow-y: auto;
    }
    .kanban-card {
      padding: 10px 14px;
      border-bottom: 1px solid var(--color-border);
      font-size: 13px;
      font-family: 'Share Tech Mono', monospace;
      cursor: default;
      transition: background 0.15s;
    }
    .kanban-card:hover { background: var(--color-surface-2); }
    .kanban-card .card-name { font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .kanban-card .card-meta { font-size: 11px; color: var(--color-dim); }

    .results-table { width: 100%; border-collapse: collapse; font-size: 14px; font-family: 'Share Tech Mono', monospace; }
    .results-table th { text-align: left; padding: 12px 16px; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--color-dim); border-bottom: 2px solid var(--color-border); background: var(--color-surface); position: sticky; top: 0; font-family: 'Share Tech Mono', monospace; cursor: pointer; user-select: none; white-space: nowrap; }
    .results-table th:hover { color: var(--color-accent); }
    .results-table th.sort-asc::after { content: ' \25B2'; font-size: 9px; color: var(--color-accent); }
    .results-table th.sort-desc::after { content: ' \25BC'; font-size: 9px; color: var(--color-accent); }
    .results-table td { padding: 12px 16px; border-bottom: 1px solid var(--color-border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; font-family: 'Share Tech Mono', monospace; }
    .results-table tr:hover td { background: var(--color-surface-2); }

    .toast { position: fixed; bottom: 32px; right: 32px; padding: 16px 24px; border-radius: 0; font-size: 14px; font-family: 'Share Tech Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 4px 4px 0px rgba(0,0,0,0.6); transform: translateY(100px); opacity: 0; transition: all 0.3s ease; z-index: 1000; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--color-surface); border: 1px solid var(--color-border); border-left: 4px solid var(--color-good); color: var(--color-hud-bright); }
    .toast.error { background: var(--color-surface); border: 1px solid var(--color-border); border-left: 4px solid var(--color-bad); color: var(--color-hud-bright); }

    .kpi-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      padding: 16px 20px;
      box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
      position: relative;
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--color-accent);
    }
    .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--color-dim); font-family: 'Share Tech Mono', monospace; margin-bottom: 6px; }
    .kpi-value { font-size: 32px; font-weight: 700; line-height: 1; }
    .kpi-sub { font-size: 12px; color: var(--color-dim); margin-top: 4px; font-family: 'Share Tech Mono', monospace; }

    .activity-item {
      padding: 10px 16px;
      border-bottom: 1px solid var(--color-border);
      font-size: 13px;
      font-family: 'Share Tech Mono', monospace;
    }
    .activity-item:hover { background: var(--color-surface-2); }

    .config-drawer { position:fixed; top:0; right:-420px; width:420px; height:100vh; background:var(--color-surface); border-left:2px solid var(--color-border); z-index:200; transition:right 0.3s ease; overflow-y:auto; box-shadow:-8px 0 24px rgba(0,0,0,0.5); }
    .config-drawer.open { right:0; }
    .config-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:199; display:none; }
    .config-overlay.open { display:block; }
    .global-progress { background:var(--color-surface); border-bottom:1px solid var(--color-border); position:relative; z-index:1; }
    .gp-step { flex:1; padding:10px 8px; text-align:center; border-right:1px solid var(--color-border); position:relative; }
    .gp-step:last-child { border-right:none; }
    .gp-step-label { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--color-dim); font-family:'Share Tech Mono',monospace; margin-bottom:2px; }
    .gp-step-count { font-size:20px; font-weight:700; font-family:'Share Tech Mono',monospace; }
    .gp-step-bar { height:3px; background:var(--color-bg); margin-top:4px; }
    .gp-step-bar-fill { height:100%; transition:width 0.5s ease; }
    .gp-arrow { color:var(--color-dim); font-size:10px; display:flex; align-items:center; padding:0 2px; }
    .source-badge { background:var(--color-accent-glow); border:1px solid var(--color-accent-dim); padding:8px 16px; display:flex; align-items:center; gap:8px; font-family:'Share Tech Mono',monospace; font-size:13px; }
    .source-badge i { color:var(--color-accent); }
    details > summary { cursor:pointer; list-style:none; }
    details > summary::-webkit-details-marker { display:none; }
    details > summary::before { content:'\25B6'; display:inline-block; margin-right:8px; font-size:10px; transition:transform 0.2s; color:var(--color-accent); }
    details[open] > summary::before { transform:rotate(90deg); }
    .collapsible-header { cursor:pointer; user-select:none; }
    .collapsible-header:hover { opacity:0.85; }
    .collapsible-header::before { content:'\25B6'; display:inline-block; margin-right:8px; font-size:10px; transition:transform 0.2s; color:var(--color-accent); }
    .collapsible-header.collapsed::before { transform:rotate(0deg); }
    .collapsible-header.expanded::before { transform:rotate(90deg); }
    .collapsible-body { transition:max-height 0.3s ease, opacity 0.2s ease; overflow:hidden; }
    .collapsible-body.collapsed { max-height:0; opacity:0; padding-top:0; padding-bottom:0; }
    .collapsible-body.expanded { max-height:2000px; opacity:1; }

  </style>
</head>
<body class="min-h-screen p-0 m-0 bg-bg text-hud-bright">

  <script>function initSortable(table){if(!table)return;var container=table.closest('[id]');var cid=container?container.id:'';var ths=table.querySelectorAll('thead th');var tbody=table.querySelector('tbody');if(!tbody)return;ths.forEach(function(th,colIdx){if(th.dataset.nosort!==undefined)return;th.addEventListener('click',function(){var dir=th.classList.contains('sort-asc')?'desc':'asc';ths.forEach(function(h){h.classList.remove('sort-asc','sort-desc')});th.classList.add('sort-'+dir);if(cid)window._sortState[cid]={col:colIdx,dir:dir};doSort(tbody,ths,colIdx,dir)})});var saved=cid&&window._sortState[cid];if(saved&&ths[saved.col]){ths[saved.col].classList.add('sort-'+saved.dir);doSort(tbody,ths,saved.col,saved.dir)}}
function doSort(tbody,ths,colIdx,dir){var rows=Array.from(tbody.querySelectorAll('tr'));rows.sort(function(a,b){var va=a.children[colIdx].dataset.sort||a.children[colIdx].textContent.trim();var vb=b.children[colIdx].dataset.sort||b.children[colIdx].textContent.trim();var na=parseFloat(va),nb=parseFloat(vb);if(!isNaN(na)&&!isNaN(nb)){return dir==='asc'?na-nb:nb-na}return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va)});rows.forEach(function(r){tbody.appendChild(r)})}
function toggleCollapsible(id){var body=document.getElementById(id);var header=document.querySelector('[data-collapse="'+id+'"]');if(!body||!header)return;if(body.classList.contains('collapsed')){body.classList.remove('collapsed');body.classList.add('expanded');header.classList.remove('collapsed');header.classList.add('expanded')}else{body.classList.remove('expanded');body.classList.add('collapsed');header.classList.remove('expanded');header.classList.add('collapsed')}}
</script>

    ];

    const PIPELINE_COLORS = {};
    PIPELINE_STAGES.forEach(s => { PIPELINE_COLORS[s.key] = s.color; });

    function stepsHTML(steps) {
      var maxCount = 0;
      steps.forEach(function(s) { if (s.count > maxCount) maxCount = s.count; });
      maxCount = maxCount || 1;
      var html = '';
      for (var i = 0; i < steps.length; i++) {
        var s = steps[i];
        var pct = ((s.count / maxCount) * 100).toFixed(0);
        var convRate = '';
        if (i > 0 && steps[i - 1].count > 0) {
          var rate = ((s.count / steps[i - 1].count) * 100).toFixed(1);
          convRate = '<span class="step-cell-rate" style="color:' + (parseFloat(rate) >= 30 ? 'var(--color-good)' : parseFloat(rate) >= 10 ? 'var(--color-warn)' : 'var(--color-dim)') + '">' + rate + '%</span>';
        } else if (i > 0) {
          convRate = '<span class="step-cell-rate" style="color:var(--color-dim)">—</span>';
        }
        html += '<div class="step-row">' +
          '<div class="step-cell" style="border-left:3px solid ' + s.color + '">' +
            '<div class="step-cell-label">' + s.label + '</div>' +
            '<div class="step-cell-bar">' +
              '<div class="step-cell-count" style="color:' + s.color + '">' + s.count + '</div>' +
              '<div class="step-bar-track"><div class="step-bar-fill" style="width:' + pct + '%;background:' + s.color + '"></div></div>' +
              '<div class="step-cell-pct">' + pct + '%</div>' +
            '</div>' +
          '</div>' +
          (i > 0 ? '<div class="step-cell"><div class="step-cell-arrow"><i class="ph ph-arrow-up"></i></div>' + convRate + '</div>' : '') +
        '</div>';
      }
      return html;
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('#sc-niche, #sc-rpm, #sc-retries, #sc-delay-min, #sc-delay-max, #sc-cities').forEach(el => {
        el.addEventListener('input', () => { configDirty = true; });
        el.addEventListener('change', () => { configDirty = true; });
      });
      document.querySelectorAll('#dc-enabled, #dc-batch-size, #dc-interval, #dc-priority-cities, #dc-exclude-niches').forEach(el => {
        el.addEventListener('input', () => { discoveryConfigDirty = true; });
        el.addEventListener('change', () => { discoveryConfigDirty = true; });
      });
    });

    function ago(iso) {
      if (!iso) return '—';
      const diff = Date.now() - new Date(iso).getTime();
      if (diff < 60000) return Math.floor(diff / 1000) + 's ago';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
      return Math.floor(diff / 86400000) + 'd ago';
    }

    function badge(status) {
      const cls = 'badge-' + (status || 'new').replace(/\s/g, '_');
      return '<span class="badge ' + cls + '">' + (status || 'new') + '</span>';
    }

    function uptime() {
      const s = Math.floor((Date.now() - startTime) / 1000);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      if (h > 0) return h + 'h ' + (m % 60) + 'm uptime';
      if (m > 0) return m + 'm ' + (s % 60) + 's uptime';
      return s + 's uptime';
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (type || 'success') + ' show';
      setTimeout(function() { t.className = 'toast'; }, 3000);
    }

    // Tab-to-subview mapping
    var TAB_VIEWS = {
      targeting: ['view-targeting', 'view-discovery', 'view-niches'],
      leads: ['view-leads', 'view-scraper'],
      sales: ['view-sales', 'view-pipeline', 'view-activity']
    };

    function switchTab(tab) {
      document.querySelectorAll('.nav-tab').forEach(function(el) {
        el.style.borderBottomColor = 'transparent';
        el.style.color = 'var(--color-dim)';
        el.classList.remove('nav-active');
      });
      // Hide all views
      document.querySelectorAll('.view').forEach(function(el) {
        el.classList.remove('active');
        el.style.display = '';
      });
      var activeTab = document.querySelector('.nav-tab[data-tab="' + tab + '"]');
      activeTab.style.borderBottomColor = 'var(--color-accent)';
      activeTab.style.color = 'var(--color-accent)';
      activeTab.classList.add('nav-active');
      // Show all sub-views for this tab
      var views = TAB_VIEWS[tab] || [];
      views.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) { el.classList.add('active'); el.style.display = ''; }
      });
      // Refresh data
      if (tab === 'targeting') { refreshDiscoveryView(); refreshNichesView(); }
      if (tab === 'leads') { refreshScraperView(); loadActiveSource(); }
      if (tab === 'sales') { refresh(); refreshActivity(); }
    }

    async function loadActiveSource() {

        var pairs = r.data.docs || [];
        var el = document.getElementById('active-source-text');

    async function triggerJob(jobType) {
      var btn = document.getElementById('btn-' + jobType.replace(/_/g, '-'));
      if (btn) btn.classList.add('loading');

        await axios.post(API + '/api/jobs/trigger', { jobType }, { headers: Object.assign({}, headers, { 'Content-Type': 'application/json' }) });

    async function refresh() {
      try {
        var results = await Promise.all([
          axios.get(API + '/api/leads?limit=500', { headers: headers }),
          axios.get(API + '/api/clients', { headers: headers }),
          axios.get(API + '/api/jobs?limit=100', { headers: headers }),
          axios.get(API + '/api/config', { headers: headers }),
        ]);
        var allLeads = results[0].data.docs || [];
        var clients = results[1].data.docs || [];
        var jobs = results[2].data.docs || [];

        document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString();

    function renderGlobalProgress(statusCounts, totalLeads) {
      var allSteps = [
        { label: 'Discovered', key: '_disc', color: '#74b9ff' },
        { label: 'Scraped', key: '_scraped', color: '#a78bfa' },
        { label: 'Emails found', key: '_enriched', color: '#818cf8' },
        { label: 'Ready to email', key: '_outreach', color: '#22c55e' },
        { label: 'Contacted', key: 'contacted', color: '#f0a64b' },
        { label: 'Interested', key: 'replied_interested', color: '#34d399' },
        { label: 'Paid', key: 'paid', color: '#22c55e' }
      ];
      var counts = {};
      allSteps.forEach(function(s) { counts[s.key] = statusCounts[s.key] || 0; });
      counts['_scraped'] = totalLeads || 0;
      if (window._gpDiscovery) counts['_disc'] = window._gpDiscovery;
      if (window._gpEnriched) counts['_enriched'] = window._gpEnriched;
      if (window._gpOutreach) counts['_outreach'] = window._gpOutreach;
      var steps = allSteps.filter(function(s) { return counts[s.key] > 0; });
      if (steps.length === 0) { document.getElementById('global-progress-bar').innerHTML = ''; return; }
      var maxCount = 1;
      steps.forEach(function(s) { if (counts[s.key] > maxCount) maxCount = counts[s.key]; });
      var html = '';
      steps.forEach(function(s, i) {
        var c = counts[s.key];
        var pct = Math.min(100, (c / maxCount) * 100);
        if (i > 0) html += '<div class="gp-arrow"><i class="ph ph-caret-right"></i></div>';
        html += '<div class="gp-step">' +
          '<div class="gp-step-label">' + s.label + '</div>' +
          '<div class="gp-step-count" style="color:' + s.color + '">' + c + '</div>' +
          '<div class="gp-step-bar"><div class="gp-step-bar-fill" style="width:' + pct + '%;background:' + s.color + '"></div></div>' +
        '</div>';
      });
      document.getElementById('global-progress-bar').innerHTML = html;
    }

    // Async fetch for global progress extras
    async function updateGlobalProgressExtras() {
      try {
        var results = await Promise.all([
          axios.get(API + '/api/niches/stats', { headers: headers }).catch(function() { return { data: { total: 0 } }; }),
          axios.get(API + '/api/scraper/enrich/stats', { headers: headers }).catch(function() { return { data: {} }; })

    function renderKPIs(statusCounts, jobStatusCounts, clients, allLeads) {
      var contacted = statusCounts.contacted || 0;
      var replied = (statusCounts.replied_interested || 0) + (statusCounts.replied_objection || 0);
      var replyRate = contacted > 0 ? ((replied / contacted) * 100).toFixed(1) : '\u2014';

      var demosSent = statusCounts.demo_sent || 0;
      var paid = statusCounts.paid || 0;
      var demoCloseRate = demosSent > 0 ? ((paid / (demosSent + paid + (statusCounts.lost || 0))) * 100).toFixed(1) : '\u2014';

      var activeClients = clients.filter(function(c) { return c.status === 'active'; }).length;
      var totalLeads = allLeads.length;

      var queueHealth = (jobStatusCounts.queued || 0) + ' queued / ' + (jobStatusCounts.running || 0) + ' active';
      var deadJobs = jobStatusCounts.dead || 0;
      if (deadJobs > 0) queueHealth += ' / ' + deadJobs + ' DEAD';

      document.getElementById('kpi-row').innerHTML =
        '<div class="kpi-card">' +
          '<div class="kpi-label">Reply Rate</div>' +
          '<div class="kpi-value" style="color:' + (replyRate === '\u2014' ? 'var(--color-dim)' : parseFloat(replyRate) >= 5 ? 'var(--color-good)' : 'var(--color-warn)') + '">' + replyRate + (replyRate !== '\u2014' ? '%' : '') + '</div>' +
          '<div class="kpi-sub">' + replied + ' replies / ' + contacted + ' contacted</div>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<div class="kpi-label">Demo \u2192 Close Rate</div>' +
          '<div class="kpi-value" style="color:' + (demoCloseRate === '\u2014' ? 'var(--color-dim)' : parseFloat(demoCloseRate) >= 30 ? 'var(--color-good)' : 'var(--color-warn)') + '">' + demoCloseRate + (demoCloseRate !== '\u2014' ? '%' : '') + '</div>' +
          '<div class="kpi-sub">' + paid + ' paid from ' + demosSent + ' demos</div>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<div class="kpi-label">Active Clients</div>' +
          '<div class="kpi-value" style="color:var(--color-good)">' + activeClients + '</div>' +
          '<div class="kpi-sub">' + clients.length + ' total client records</div>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<div class="kpi-label">Total Leads</div>' +
          '<div class="kpi-value" style="color:var(--color-info)">' + totalLeads + '</div>' +
          '<div class="kpi-sub">' + (statusCounts.new || 0) + ' new, ' + (statusCounts.scored || 0) + ' scored</div>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<div class="kpi-label">Queue Health</div>' +
          '<div class="kpi-value" style="color:var(--color-warn)">' + (jobStatusCounts.queued || 0) + '</div>' +
          '<div class="kpi-sub">' + queueHealth + '</div>' +
        '</div>';
    }

    function renderPipelineBar(statusCounts, total) {
      total = total || 1;
      var bar = document.getElementById('pipeline-bar');
      var legend = document.getElementById('pipeline-legend');
      var barHtml = '';
      var legendHtml = '';
      PIPELINE_STAGES.forEach(function(stage) {
        var c = statusCounts[stage.key] || 0;
        if (c > 0) {
          barHtml += '<div style="width:' + ((c / total) * 100) + '%;background:' + stage.color + '" title="' + stage.label + ': ' + c + '"></div>';
        }
        legendHtml += '<span class="text-[11px] text-dim flex items-center gap-1" style="font-family:Share Tech Mono,monospace">' +
          '<span class="w-2 h-2 inline-block" style="background:' + stage.color + '"></span>' +
          stage.label + ' (' + c + ')</span>';
      });
      bar.innerHTML = barHtml;
      legend.innerHTML = legendHtml;

      var mainFlow = ['new', 'scored', 'contacted', 'replied_interested', 'demo_sent', 'paid'];
      var pipelineSteps = mainFlow.map(function(key) {
        var stage = PIPELINE_STAGES.find(function(s) { return s.key === key; });
        return { label: stage.label, count: statusCounts[key] || 0, color: stage.color };
      });
      document.getElementById('pipeline-steps').innerHTML = stepsHTML(pipelineSteps);
    }

    function renderKanban(allLeads) {
      var buckets = {};
      PIPELINE_STAGES.forEach(function(s) { buckets[s.key] = []; });
      allLeads.forEach(function(l) {
        if (buckets[l.status]) {
          buckets[l.status].push(l);
        }
      });

      var html = '';
      PIPELINE_STAGES.forEach(function(stage) {
        var leads = buckets[stage.key] || [];
        html += '<div class="kanban-col">' +
          '<div class="kanban-col-header" style="border-left:3px solid ' + stage.color + '">' +
            '<span style="color:' + stage.color + '"><i class="ph ' + stage.icon + ' mr-1"></i>' + stage.label + '</span>' +
            '<span class="text-dim">' + leads.length + '</span>' +
          '</div>' +
          '<div class="kanban-col-body">';

        if (leads.length === 0) {
          html += '<div class="py-6 px-4 text-center text-dim text-[12px]">Empty</div>';
        } else {
          leads.slice(0, 15).forEach(function(l) {
            var name = l.businessName || l.business_name || '\u2014';
            var meta = (l.niche || '') + ' \u00b7 ' + (l.city || '');
            var tier = l.priorityTier || l.priority_tier;
            var tierDot = tier ? '<span class="priority-dot priority-dot-' + tier + '" style="display:inline-block;width:6px;height:6px;margin-right:4px;vertical-align:middle;border:1px solid rgba(0,0,0,0.5);background:var(--color-' + (tier === 'hot' ? 'bad' : tier === 'warm' ? 'warn' : 'dim') + ')"></span>' : '';
            html += '<div class="kanban-card">' +
              '<div class="card-name">' + tierDot + name + '</div>' +
              '<div class="card-meta">' + meta + '</div>' +
            '</div>';
          });
          if (leads.length > 15) {
            html += '<div class="py-3 px-4 text-center text-dim text-[11px]">+' + (leads.length - 15) + ' more</div>';
          }
        }
        html += '</div></div>';
      });

      document.getElementById('kanban-board').innerHTML = html;
    }

    function renderJobs(jobs, totalDocs) {
      document.getElementById('job-count').textContent = (totalDocs || jobs.length) + ' total';
      var list = document.getElementById('jobs-list');
      if (jobs.length === 0) {
        list.innerHTML = '<div class="py-10 px-5 text-center text-dim text-[13px]">No jobs yet</div>';
      } else {
        list.innerHTML = jobs.slice(0, 30).map(function(j) {

          '</div>';

      }
    }

    function renderClients(clients, totalDocs) {
      document.getElementById('client-count').textContent = (totalDocs || clients.length) + ' total';
      var list = document.getElementById('clients-list');
      if (clients.length === 0) {
        list.innerHTML = '<div class="py-10 px-5 text-center text-dim text-[13px]">No clients yet</div>';

        list.innerHTML = clients.slice(0, 20).map(function(c) {
          return '<div class="flex items-center px-6 py-3 border-b border-border text-[13px] gap-3 hover:bg-accent-glow">' +

            '<span class="text-dim text-[13px]">' + (c.plan || '\u2014') + '</span>' +
            badge(c.status) +
            '<span class="text-dim text-[13px] min-w-[70px] text-right">' + ago(c.createdAt || c.created_at) + '</span>' +
          '</div>';
        }).join('');

    }

    async function loadScraperConfig() {
      try {
        var res = await axios.get(API + '/api/scraper/config', { headers: headers });
        var cfg = res.data;
        document.getElementById('sc-niche').value = cfg.niche || '';
        document.getElementById('sc-rpm').value = cfg.maxRequestsPerMinute || 8;
        document.getElementById('sc-retries').value = cfg.maxRetries || 3;
        var delay = cfg.interRequestDelayMs || [5000, 12000];
        document.getElementById('sc-delay-min').value = delay[0];
        document.getElementById('sc-delay-max').value = delay[1];
        document.getElementById('sc-cities').value = (cfg.cities || []).join('\n');
        configDirty = false;
      } catch (err) {
        showToast('Failed to load scraper config', 'error');
      }
    }

    async function saveScraperConfig() {
      var btn = document.getElementById('btn-scraper-save');
      btn.classList.add('loading');
      try {
        var cities = document.getElementById('sc-cities').value.split('\n').map(function(l) { return l.trim(); }).filter(Boolean);
        var data = {
          niche: document.getElementById('sc-niche').value.trim() || 'hvac',
          cities: cities,
          maxRequestsPerMinute: parseInt(document.getElementById('sc-rpm').value) || 8,
          maxRetries: parseInt(document.getElementById('sc-retries').value) || 3,
          interRequestDelayMs: [
            parseInt(document.getElementById('sc-delay-min').value) || 5000,
            parseInt(document.getElementById('sc-delay-max').value) || 12000,
          ],
        };
        await axios.patch(API + '/api/scraper/config', data, { headers: Object.assign({}, headers, { 'Content-Type': 'application/json' }) });
        configDirty = false;
        showToast('\u2713 Scraper config saved', 'success');
      } catch (err) {
        showToast('\u2717 Save failed: ' + (err.response && err.response.data && err.response.data.error || err.message), 'error');
      } finally {
        btn.classList.remove('loading');
      }
    }

    async function runScraper() {
      var btn = document.getElementById('btn-run-scraper');
      btn.classList.add('loading');
      document.getElementById('scraper-status-text').textContent = 'Queuing scraper...';
      try {
        var niche = document.getElementById('sc-niche').value.trim() || undefined;
        var cities = document.getElementById('sc-cities').value.split('\n').map(function(l) { return l.trim(); }).filter(Boolean);
        var payload = {};
        if (niche) payload.niche = niche;
        if (cities.length > 0) payload.cities = cities;
        await axios.post(API + '/api/scraper/run', payload, { headers: Object.assign({}, headers, { 'Content-Type': 'application/json' }) });
        showToast('\u2713 Scraper job queued', 'success');
        document.getElementById('scraper-status-text').textContent = 'Job queued \u2014 monitoring...';
        setTimeout(function() { refreshScraperView(); document.getElementById('scraper-status-text').textContent = ''; }, 2000);
      } catch (err) {
        showToast('\u2717 Failed: ' + (err.response && err.response.data && err.response.data.error || err.message), 'error');

    async function refreshScraperJobs() {
      try {
        var res = await axios.get(API + '/api/scraper/history?limit=30', { headers: headers });
        var jobs = res.data.docs || [];
        document.getElementById('scraper-job-count').textContent = (res.data.totalDocs ?? jobs.length) + ' total';

        if (jobs.length === 0) {
          list.innerHTML = '<div class="py-10 px-5 text-center text-dim text-[13px]">No scraper jobs yet</div>';
          return;
        }
        list.innerHTML = jobs.map(function(j) {
          var output = j.outputData || j.output_data || {};
          var input = j.inputData || j.input_data || {};
          var jobType = j.jobType || j.job_type || '';
          var detail = '';
          if (j.status === 'completed') {
            if (jobType === 'lead_gen') detail = (output.leads_created ?? 0) + ' created, ' + (output.leads_skipped ?? 0) + ' skipped';
            else if (jobType === 'email_enrich') detail = (output.processed ?? 0) + ' checked, ' + (output.emails_found ?? 0) + ' emails found';
            else if (jobType === 'email_validate') detail = (output.validated ?? 0) + ' validated (' + (output.valid ?? 0) + ' valid)';
            else detail = 'Completed';
          } else if (j.status === 'failed') {
            detail = j.errorMessage || j.error_message || 'Unknown error';
          } else if (j.status === 'running') {
            detail = 'In progress...';
          } else {
            detail = 'Waiting...';
          }
          return '<div class="flex items-center px-6 py-3 border-b border-border text-[13px] gap-3 hover:bg-accent-glow">' +
            '<span class="flex-1 font-medium">' + jobType.replace(/_/g, ' ') + (input.niche ? ' \u2014 ' + input.niche : '') + ((input.cities || []).length ? ' \u2014 ' + input.cities.join(', ') : '') + '</span>' +
            '<span class="text-dim text-[13px]">' + detail + '</span>' +
            badge(j.status) +
            '<span class="text-dim text-[13px] min-w-[70px] text-right">' + ago(j.updatedAt || j.updated_at) + '</span>' +
          '</div>';
        }).join('');
      } catch (err) {
        console.error('Scraper jobs error:', err);
      }
    }

        var body = {

          agencyPages: parseInt(document.getElementById('np-agency').value) || null,

          contactablePct: parseInt(document.getElementById('np-contact').value) || null,
          economicSignal: document.getElementById('np-econ').value,

          await axios.patch(API + '/api/niches/' + r.data.id + '/score', {}, { headers: Object.assign({}, headers, { 'Content-Type': 'application/json' }) });
        }
        ['np-niche','np-city','np-state','np-maps','np-velocity','np-ads','np-agency','np-weak','np-contact','np-notes'].forEach(function(id) { document.getElementById(id).value = ''; });
        showToast('\u2713 Pair added' + (body.mapsCount ? ' & scored' : ''), 'success');
        refreshNichesView();
      } catch (err) {
        showToast('\u2717 ' + (err.response && err.response.data && err.response.data.error || err.message), 'error');
      } finally {
        btn.classList.remove('loading');
      }
    }

    async function scorePair(id) {
      try {
        var r = await axios.patch(API + '/api/niches/' + id + '/score', {}, { headers: Object.assign({}, headers, { 'Content-Type': 'application/json' }) });
        var total = (r.data.scores && r.data.scores.totalScore) ?? r.data.total_score ?? '?';
        showToast('\u2713 Scored: ' + total + '/100', 'success');
        refreshNichesView();
      } catch (err) {
        showToast('\u2717 ' + (err.response && err.response.data && err.response.data.error || err.message), 'error');
      }
    }

    async function validatePair(id) {
      try {
        await axios.post(API + '/api/niches/' + id + '/validate', {}, { headers: Object.assign({}, headers, { 'Content-Type': 'application/json' }) });
        showToast('\u2713 Validation job queued \u2014 check back in 2 minutes', 'success');
        refreshNichesView();
      } catch (err) {
        showToast('\u2717 ' + (err.response && err.response.data && err.response.data.error || err.message), 'error');
      }
    }

    async function approvePair(id) {
      try {
        var r = await axios.patch(API + '/api/niches/' + id + '/approve', {}, { headers: Object.assign({}, headers, { 'Content-Type': 'application/json' }) });
        showToast('\u2713 Approved \u2014 ready for lead gen!', 'success');
        refreshNichesView();
      } catch (err) {
        showToast('\u2717 ' + (err.response && err.response.data && err.response.data.error || err.message), 'error');
      }
    }

    async function parkPair(id) {
      try {
        await axios.patch(API + '/api/niches/' + id + '/decide', {}, { headers: Object.assign({}, headers, { 'Content-Type': 'application/json' }) });
        showToast('\u2713 Parked', 'success');
        refreshNichesView();
      } catch (err) {
        showToast('\u2717 ' + (err.response && err.response.data && err.response.data.error || err.message), 'error');
      }
    }

    async function deletePair(id) {
      if (!confirm('Delete this pair?')) return;
      try {
        await axios.delete(API + '/api/niches/' + id, { headers: headers });
        showToast('\u2713 Pair deleted', 'success');
        refreshNichesView();
      } catch (err) {
        showToast('\u2717 ' + (err.response && err.response.data && err.response.data.error || err.message), 'error');
      }
    }

    // ─── DISCOVERY FUNCTIONS ──────────────────────────────

    async function refreshDiscoveryView() {
      var tasks = [refreshDiscoveryStats()];
      if (!discoveryConfigDirty) tasks.push(loadDiscoveryConfig());
      await Promise.all(tasks);
    }

    async function loadDiscoveryConfig() {
      try {
        var res = await axios.get(API + '/api/niches/discover/config', { headers: headers });
        var c = res.data;
        document.getElementById('dc-enabled').checked = !!c.enabled;
        document.getElementById('dc-batch-size').value = c.batchSize || 20;
        document.getElementById('dc-interval').value = c.intervalHours || 6;
        document.getElementById('dc-priority-cities').value = (c.priorityCities || []).join('\n');
        document.getElementById('dc-exclude-niches').value = (c.excludeNiches || []).join('\n');
        discoveryConfigDirty = false;
      } catch (err) {
        console.error('Failed to load discovery config:', err);
      }
    }

    async function saveDiscoveryConfig() {
      var btn = document.getElementById('btn-discovery-save');
      btn.classList.add('loading');
      try {
        var priorityCities = document.getElementById('dc-priority-cities').value.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
        var excludeNiches = document.getElementById('dc-exclude-niches').value.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
        var body = {
          enabled: document.getElementById('dc-enabled').checked,
          batchSize: parseInt(document.getElementById('dc-batch-size').value) || 20,
          intervalHours: parseInt(document.getElementById('dc-interval').value) || 6,
          priorityCities: priorityCities,
          excludeNiches: excludeNiches,
        };
        await axios.patch(API + '/api/niches/discover/config', body, { headers: Object.assign({}, headers, { 'Content-Type': 'application/json' }) });
        showToast('\u2713 Discovery config saved', 'success');
        discoveryConfigDirty = false;
        await loadDiscoveryConfig();
      } catch (err) {
        showToast('\u2717 ' + (err.response && err.response.data && err.response.data.error || err.message), 'error');
      } finally {
        btn.classList.remove('loading');
      }
    }

    async function triggerDiscovery() {
      var btn = document.getElementById('btn-trigger-discovery');
      btn.classList.add('loading');
      try {
        await axios.post(API + '/api/niches/discover', {}, { headers: Object.assign({}, headers, { 'Content-Type': 'application/json' }) });
        showToast('\u2713 Discovery triggered', 'success');
        refreshDiscoveryView();
      } catch (err) {
        showToast('\u2717 ' + (err.response && err.response.data && err.response.data.error || err.message), 'error');
      } finally {
        btn.classList.remove('loading');
      }
    }

    async function refreshDiscoveryStats() {
      try {
        var res = await axios.get(API + '/api/niches/discover/stats', { headers: headers });
        var s = res.data;
        var p = s.pipeline || {};
        var cfg = s.config || {};
        var jobs = s.recentJobs || [];

        document.getElementById('discovery-stats-row').innerHTML =
          '<div class="hud-panel p-6 flex flex-col gap-1 hover:border-accent"><span class="text-[13px] uppercase tracking-widest text-dim">Status</span><span class="text-[28px] font-bold text-accent" style="font-family:Share Tech Mono,monospace">' + (cfg.enabled ? 'Active' : 'Paused') + '</span><span class="text-[13px] text-dim">Human approval required (score ≥ 55)</span></div>' +
          '<div class="hud-panel p-6 flex flex-col gap-1 hover:border-accent"><span class="text-[13px] uppercase tracking-widest text-dim">Total Pairs</span><span class="text-[28px] font-bold" style="font-family:Share Tech Mono,monospace">' + (p.total || 0) + '</span><span class="text-[13px] text-dim">' + (s.coverage ? s.coverage.uniqueCities : 0) + ' cities, ' + (s.coverage ? s.coverage.uniqueNiches : 0) + ' niches</span></div>' +
          '<div class="hud-panel p-6 flex flex-col gap-1 hover:border-accent"><span class="text-[13px] uppercase tracking-widest text-dim">Approved</span><span class="text-[28px] font-bold text-good" style="font-family:Share Tech Mono,monospace">' + (p.approved || 0) + '</span><span class="text-[13px] text-dim">ready for lead gen</span></div>' +
          '<div class="hud-panel p-6 flex flex-col gap-1 hover:border-accent"><span class="text-[13px] uppercase tracking-widest text-dim">Parked / Dropped</span><span class="text-[28px] font-bold text-dim" style="font-family:Share Tech Mono,monospace">' + (p.parked || 0) + ' / ' + (p.dropped || 0) + '</span></div>' +
          '<div class="hud-panel p-6 flex flex-col gap-1 hover:border-accent"><span class="text-[13px] uppercase tracking-widest text-dim">Last Run</span><span class="text-[14px] font-bold">' + ago(cfg.lastRun) + '</span></div>';

        var funnelStatuses = ['candidate', 'scored', 'validated', 'approved'];
        var funnelCounts = [p.candidate || 0, p.scored || 0, p.validated || 0, p.approved || 0];
        var funnelColors = ['#74b9ff', '#fdcb6e', '#3b82f6', '#00b894'];
        var total = funnelCounts.reduce(function(a, b) { return a + b; }, 0) || 1;
        var bar = document.getElementById('discovery-funnel-bar');
        var legend = document.getElementById('discovery-funnel-legend');
        var barHtml = '';
        var legendHtml = '';
        funnelStatuses.forEach(function(status, i) {
          var c = funnelCounts[i] || 0;
          if (c > 0) barHtml += '<div style="width:' + ((c / total) * 100) + '%;background:' + funnelColors[i] + '" title="' + status + ': ' + c + '"></div>';
          legendHtml += '<span class="text-[13px] text-dim flex items-center gap-1"><span class="w-2 h-2 inline-block" style="background:' + funnelColors[i] + '"></span>' + status + ' (' + c + ')</span>';
        });
        bar.innerHTML = barHtml;
        legend.innerHTML = legendHtml;

        var discSteps = [
          { label: 'Candidate', count: p.candidate || 0, color: '#74b9ff' },
          { label: 'Scored', count: p.scored || 0, color: '#fdcb6e' },
          { label: 'Validated', count: p.validated || 0, color: '#3b82f6' },
          { label: 'Approved', count: p.approved || 0, color: '#00b894' },
        ];
        document.getElementById('discovery-steps').innerHTML = stepsHTML(discSteps);

        var jobsHtml = '';
        jobs.forEach(function(j) {
          var out = j.output || {};
          jobsHtml += '<div class="flex items-center gap-3 px-5 py-3 border-b border-border hover:bg-accent-glow">' +
            '<span class="text-[12px] font-bold" style="font-family:Share Tech Mono,monospace;min-width:90px">' + (j.status === 'completed' ? out.citiesProbed + ' cities' : j.status) + '</span>' +
            '<span class="text-[12px] text-dim">' + (out.pairsCreated || 0) + ' created, ' + (out.pairsScored || 0) + ' scored, ' + (out.validationQueued || 0) + ' validated</span>' +
            badge(j.status) +
            '<span class="text-[12px] text-dim ml-auto">' + ago(j.completedAt || j.createdAt) + '</span>' +
          '</div>';
        });
        document.getElementById('discovery-jobs-list').innerHTML = jobsHtml || '<div class="py-4 px-5 text-dim text-[13px]">No discovery runs yet</div>';
      } catch (err) {
        console.error('Discovery stats error:', err);
      }
    }

    // ─── INIT ──────────────────────────────────────────

    // Init: show targeting tab by default
    switchTab('targeting');
    refresh();
    updateGlobalProgressExtras();
    setInterval(function() {
      refresh();
      updateGlobalProgressExtras();
      var activeTab = document.querySelector('.nav-tab.nav-active');
      var tab = activeTab ? activeTab.getAttribute('data-tab') : '';
      if (tab === 'targeting') { refreshDiscoveryView(); refreshNichesView(); }
      if (tab === 'leads') { refreshScraperView(); }
      if (tab === 'sales') { refreshActivity(); }
    }, 5000);
  </script>

</body>
</html>
