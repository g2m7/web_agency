services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: web_agency
      POSTGRES_USER: web_agency
      POSTGRES_PASSWORD: web_agency
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U web_agency -d web_agency"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - dev

volumes:
  pgdata:
